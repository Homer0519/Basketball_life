plugins{id 'com.android.application'}
android{
  namespace 'com.bblgame.app'
  compileSdk 34
  signingConfigs{
    fixed{
      storeFile file('../debug.keystore')
      storePassword 'bbl1234'
      keyAlias 'bbl'
      keyPassword 'bbl1234'
    }
  }
  defaultConfig{
    applicationId 'com.bblgame.app'
    minSdk 24
    targetSdk 34
    versionCode 2
    versionName '1.0'
  }
  buildTypes{
    debug{signingConfig signingConfigs.fixed}
    release{minifyEnabled false;signingConfig signingConfigs.fixed;proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),'proguard-rules.pro'}
  }
  compileOptions{sourceCompatibility JavaVersion.VERSION_17;targetCompatibility JavaVersion.VERSION_17}
}
dependencies{implementation 'androidx.appcompat:appcompat:1.6.1'}
