<style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0d0f13;--panel:#14171d;--border:#1f232b;--text:#d1d5db;--text2:#7a8190;--accent:#f97316;--accent2:#fb923c;--gold:#f59e0b;--red:#ef4444;--green:#22c55e;--purple:#a855f7;--blue:#3b82f6}body{font-family:Inter,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;overflow:hidden}body.has-overlay{overflow:auto;height:auto}.sidebar{width:280px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s}.sidebar.collapsed{width:48px}.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.sidebar-header h2{font-size:15px;color:var(--accent);white-space:nowrap}.sidebar-header .toggle{background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:4px}.sidebar-body{flex:1;overflow-y:auto;padding:12px}.collapsed .sidebar-body,.collapsed .sidebar-header h2{display:none}.person-card{background:#1a1d24;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px}.person-card .name{font-size:13px;font-weight:600;margin-bottom:2px}.person-card .summary{color:var(--text2);line-height:1.4;max-height:48px;overflow:hidden}.main{flex:1;display:flex;flex-direction:column;min-width:0}.statusbar{padding:8px 16px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);display:flex;gap:14px;flex-wrap:wrap;align-items:center;background:#0d0f13}.statusbar .val{color:var(--text);font-weight:600}.pace-btns{display:flex;gap:4px;margin-left:auto}.pace-btns button{background:#1a1d24;border:1px solid var(--border);color:var(--text2);padding:2px 8px;border-radius:4px;cursor:pointer;font-size:11px}.pace-btns button.active{background:var(--accent);color:#fff;border-color:var(--accent)}.narrative{flex:1;overflow-y:auto;padding:20px 24px}.narrative-block{background:#14171d;border:1px solid var(--border);border-radius:10px;padding:18px 22px;margin-bottom:16px;max-width:900px;line-height:1.9;font-size:16px;white-space:pre-wrap}.narrative-block h2,.narrative-block h3{color:var(--gold);margin:10px 0 6px;font-size:18px}.narrative-block p{margin:8px 0}.narrative-block strong{color:#fff}.narrative-block em{color:var(--accent2)}.options-area{padding:0 24px 8px}.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:900px}.option-btn{background:#1a1d24;border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);cursor:pointer;font-size:14px;text-align:left;transition:all .15s;line-height:1.5}.option-btn:hover{background:#22262f;border-color:var(--accent);color:#fff}.option-btn .letter{color:var(--accent);font-weight:700;margin-right:8px}.input-area{padding:12px 24px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end}.input-area textarea{flex:1;background:#0d0f17;border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;resize:none;outline:none;min-height:48px;max-height:120px;font-family:inherit}.input-area textarea:focus{border-color:var(--accent)}.input-area button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;cursor:pointer;font-weight:600;white-space:nowrap}.input-area button:disabled{background:#1f232b;color:var(--text2);cursor:not-allowed}.action-row{padding:0 24px 4px;display:flex;gap:6px;max-width:900px;flex-wrap:wrap}.action-row button{background:#1a1d24;border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:4px;cursor:pointer;font-size:11px}.action-row button:hover{color:var(--text);border-color:var(--text2)}.action-row .stop{color:var(--red);border-color:#ef444444;display:none}.action-row .stop.visible{display:inline-block}.overlay{position:absolute;top:0;left:0;width:100%;min-height:100vh;background:#000c;z-index:100;padding:20px 0 60px}.start-dialog{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:520px;width:90%;margin:0 auto}.start-dialog h1{font-size:24px;color:var(--accent);margin-bottom:4px}.start-dialog .subtitle{color:var(--text2);font-size:13px;margin-bottom:20px}.field{margin-bottom:14px}.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}.field input{width:100%;background:#0d0f17;border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit}.field input:focus{border-color:var(--accent)}.pos-grid,.type-grid{display:flex;gap:6px;flex-wrap:wrap}.pos-grid button,.type-grid button{background:#1a1d24;border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}.pos-grid button.selected{background:var(--accent);color:#fff;border-color:var(--accent)}.type-grid button.selected{background:var(--blue);color:#fff;border-color:var(--blue)}.hint{color:var(--text2);font-size:11px;font-style:italic;margin-top:2px}.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:14px 24px;font-size:16px;cursor:pointer;font-weight:600;width:100%;margin-top:8px}.btn-primary:hover{background:var(--accent2)}.btn-primary:disabled{opacity:.5;cursor:not-allowed}.loading-dot{display:inline-block;width:6px;height:6px;background:var(--accent);border-radius:50%;animation:bounce 1.4s infinite;margin:0 2px}.loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;z-index:200;animation:fadeInOut 2s}@keyframes fadeInOut{0%{opacity:0}20%{opacity:1}80%{opacity:1}100%{opacity:0}}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:tra   .input-area textarea{min-height:42px;font-size:14px}

.btn-secondary{width:100%;padding:10px;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:6px;cursor:pointer;font-size:14px}.btn-secondary:hover{background:#1a1d24}

}
.attr-panel{position:fixed;right:6px;bottom:150px;width:185px;background:#14171dee;backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:10px;padding:10px 12px;z-index:10;overflow-y:auto;max-height:50vh;transition:transform .25s,opacity .25s}

.attr-header{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}

<div class="sidebar" id="sidebar"><div class="sidebar-header"><h2>认识的人</h2><button class="toggle" id="tgl">X</button></div><div class="sidebar-body" id="pl"><div class="empty-people">开局后显示</div></div></div>

<div class="field" style="border-top:1px solid var(--border);padding-top:12px;margin-top:4px"><label>API Key</label><input id="ak" placeholder="sk-..." maxlength="200" autocomplete="off" style="-webkit-text-security:disc"><div class="hint">DeepSeek API Key，存在浏览器本地</div></div><div class="field"><label>API 地址</label><input id="ab" placeholder="https://api.deepseek.com/v1" maxlength="200" value="https://api.deepseek.com/v1"></div><div class="field"><label>模型</label><input id="am" placeholder="deepseek-v4-pro" maxlength="100" value="deepseek-v4-pro"></div><div class="field"><label>最大 Token</label><input id="amt" type="number" placeholder="4096" min="256" max="32768" value="4096"></div><button class="btn-primary" id="sbn">开始游戏</button></div></div>
