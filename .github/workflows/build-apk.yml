name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 cmdline-tools;latest'

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.5
        working-directory: android

      - name: Copy web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/www
          cp www/index.html android/app/src/main/assets/www/
          cp www/engine.js android/app/src/main/assets/www/
          cp www/game.js android/app/src/main/assets/www/

      - name: Build APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/BBL_v${{ github.run_number }}.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: BBL v${{ github.run_number }}
          tag_name: v${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/BBL_v${{ github.run_number }}.apk
          fail_on_unmatched_files: false
      - name: Clean old releases (keep 10)
        run: |
          gh release list --limit 100 --json tagName --jq '.[].tagName' | tail -n +11 | while read tag; do
            gh release delete "$tag" --yes
            git push origin --delete "$tag" 2>/dev/null || true
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
